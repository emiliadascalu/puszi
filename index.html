<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Pentru tine ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ff69b4;
    font-family:Arial,sans-serif;
}

/* Inimioare */
.hearts{
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
}

.heart{
    position:absolute;
    color:white;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}

/* Plic */
.container{
    text-align:center;
    z-index:10;
}

.envelope{
    position:relative;
    width:250px;
    height:170px;
    cursor:pointer;
}

.envelope-body{
    width:100%;
    height:100%;
    background:white;
    border-radius:10px;
}

.envelope-flap{
    position:absolute;
    top:0;
    width:0;
    height:0;
    border-left:125px solid transparent;
    border-right:125px solid transparent;
    border-top:85px solid #f1f1f1;
    transform-origin:top;
    transition:1s;
}

.open-text{
    margin-top:20px;
    color:white;
    font-size:28px;
    font-weight:bold;
}

/* Mesaj */
.message{
    display:none;
    font-size:70px;
    color:white;
    font-family: "Brush Script MT", cursive;
    text-shadow:0 0 15px white;
    overflow:hidden;
    white-space:nowrap;
    border-right:3px solid white;
    width:0;
    animation:
        typing 3s steps(12,end) forwards,
        blink .8s infinite;
}

@keyframes typing{
    from{width:0}
    to{width:12ch}
}

@keyframes blink{
    50%{
        border-color:transparent;
    }
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="container" id="envelopeContainer">
    <div class="envelope" onclick="openEnvelope()">
        <div class="envelope-flap" id="flap"></div>
        <div class="envelope-body"></div>
    </div>

    <div class="open-text">Deschide-mă 💌</div>
</div>

<div class="message" id="message">
    love you :3
</div>

<script>

function createHeart(){
    const heart = document.createElement("div");

    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (15 + Math.random()*30) + "px";
    heart.style.animationDuration = (4 + Math.random()*4) + "s";

    document.getElementById("hearts").appendChild(heart);

    setTimeout(()=>heart.remove(),8000);
}

setInterval(createHeart,300);

function openEnvelope(){

    document.getElementById("flap").style.transform =
    "rotateX(180deg)";

    setTimeout(()=>{
        document.getElementById("envelopeContainer").style.display = "none";
        document.getElementById("message").style.display = "block";
    },1000);
}

</script>

</body>
</html>
